<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paulo ❤️ Brubs</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
color:white;
text-align:center;
overflow-x:hidden;
}

/* tela inicial */

#startScreen{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:28px;
z-index:9999;
cursor:pointer;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* conteúdo */

.container{
padding:25px;
opacity:0;
transition:opacity 2s;
}

h1{
font-size:34px;
margin-bottom:8px;
}

.frase{
font-size:19px;
margin-bottom:20px;
opacity:0.95;
}

#contador{
font-size:17px;
background:rgba(255,255,255,0.25);
padding:14px;
border-radius:12px;
margin-bottom:25px;
backdrop-filter: blur(8px);
}

/* slideshow */

.slideshow{
width:100%;
max-width:340px;
height:420px;
margin:auto;
border-radius:16px;
overflow:hidden;
box-shadow:0 12px 30px rgba(0,0,0,0.35);
position:relative;
background:#00000020;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
opacity:0;
transform:scale(1);
transition:opacity 1.5s ease-in-out, transform 8s linear;
}

.slideshow img.active{
opacity:1;
transform:scale(1.08);
}

/* corações */

.heart{
position:fixed;
color:white;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

footer{
margin-top:25px;
font-size:14px;
opacity:0.9;
}

</style>

</head>

<body>

<div id="startScreen">
❤️ Paulo & Brubs ❤️
<br><br>
Toque para abrir nossa história
</div>

<div class="container" id="conteudo">

<h1>Paulo ❤️ Brubs</h1>

<div class="frase">
Você é tudo o que eu sempre quis e sonhei
</div>

<div id="contador"></div>

<div class="slideshow">

<img src="foto1.jpg" class="active">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
<img src="foto8.jpg">
<img src="foto9.jpg">

</div>

<footer>
Nosso amor começou em 16 de setembro de 2025 ❤️
</footer>

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* iniciar site */

function startSite(){

document.getElementById("startScreen").style.display="none";
document.getElementById("conteudo").style.opacity=1;

const audio=document.getElementById("musica");

audio.volume=0;
audio.play();

let vol=0;

const fade=setInterval(()=>{

if(vol<1){

vol+=0.02;
audio.volume=vol;

}else{

clearInterval(fade);

}

},200);

}

document.getElementById("startScreen").onclick=startSite;


/* contador */

const inicio=new Date("2025-09-16T00:00:00");

function atualizar(){

const agora=new Date();
const diff=agora-inicio;

const dias=Math.floor(diff/(1000*60*60*24));
const horas=Math.floor((diff/(1000*60*60))%24);
const minutos=Math.floor((diff/(1000*60))%60);
const segundos=Math.floor((diff/1000)%60);

document.getElementById("contador").innerHTML=
"Estamos juntos há<br><b>"+
dias+" dias "+
horas+" horas "+
minutos+" minutos "+
segundos+" segundos ❤️</b>";

}

setInterval(atualizar,1000);


/* slideshow */

let slideIndex=0;
const slides=document.querySelectorAll(".slideshow img");

function trocar(){

slides.forEach(img=>img.classList.remove("active"));

slideIndex++;

if(slideIndex>=slides.length){
slideIndex=0;
}

slides[slideIndex].classList.add("active");

}

setInterval(trocar,4000);


/* corações */

function criarCoracao(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(criarCoracao,500);

</script>

</body>
</html>
