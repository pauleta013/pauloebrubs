<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paulo ❤️ Brubs</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
}

.container{
padding:30px 15px;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.frase{
font-size:20px;
margin-bottom:25px;
}

#contador{
font-size:18px;
background:rgba(255,255,255,0.2);
padding:12px;
border-radius:15px;
margin-bottom:30px;
}

.slideshow{
width:100%;
max-width:350px;
margin:auto;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.slideshow img{
width:100%;
display:none;
}

.slideshow img.active{
display:block;
}

footer{
margin-top:30px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>Paulo ❤️ Brubs</h1>

<div class="frase">
Você é tudo o que eu sempre quis e sonhei
</div>

<div id="contador"></div>

<div class="slideshow">

<img src="foto1.jpg" class="active">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
<img src="foto8.jpg">
<img src="foto9.jpg">

</div>

<footer>
Nosso amor começou em 16 de setembro de 2025 ❤️
</footer>

</div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* contador */

const inicio = new Date("2025-09-16T00:00:00");

function atualizar(){

const agora = new Date();
const diff = agora - inicio;

const dias = Math.floor(diff/(1000*60*60*24));
const horas = Math.floor((diff/(1000*60*60))%24);
const minutos = Math.floor((diff/(1000*60))%60);
const segundos = Math.floor((diff/1000)%60);

document.getElementById("contador").innerHTML =
"Estamos juntos há<br><b>" +
dias+" dias "+
horas+" horas "+
minutos+" minutos "+
segundos+" segundos ❤️</b>";

}

setInterval(atualizar,1000);


/* slideshow */

let slideIndex = 0;
const slides = document.querySelectorAll(".slideshow img");

function trocarFoto(){

slides.forEach(img => img.classList.remove("active"));

slideIndex++;

if(slideIndex >= slides.length){
slideIndex = 0;
}

slides[slideIndex].classList.add("active");

}

setInterval(trocarFoto,3000);

</script>

</body>
</html>
